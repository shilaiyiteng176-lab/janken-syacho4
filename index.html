<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="じゃんけん社長 Ver3.0 — 起業・経営シミュレーション＋箱庭＋コレクション">
  <meta property="og:title" content="じゃんけん社長 Ver3.0">
  <meta property="og:description" content="どの市場に参入し、どんな社員を集め、どんな理念で経営するか。自分だけの企業帝国を築け。">
  <meta name="theme-color" content="#FF8C00">
  <title>じゃんけん社長 Ver3.0</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#FFF8F0;--bg2:#FFFFFF;--bg3:#FFF3E6;
  --accent:#FF8C00;--accent2:#FFB347;--accent3:#FF4D8C;
  --gold:#D97706;
  --green:#16A34A;--blue:#2563EB;--red:#DC2626;--purple:#7C3AED;
  --text:#1A0F00;--text2:#7C4A00;--text3:#B07030;
  --border:#FFD5A0;
  --card:#FFFFFF;--card2:#FFF8F0;
}
body{background:var(--bg);color:var(--text);}
#app{max-width:390px;margin:0 auto;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Kaku Gothic ProN',sans-serif;background:var(--bg);min-height:100vh;}
.screen{display:none;}.screen.active{display:flex;flex-direction:column;min-height:100vh;}
.topbar{background:var(--accent);padding:10px 14px;display:flex;justify-content:space-between;align-items:center;border-bottom:none;}
.topbar-title{font-size:13px;font-weight:700;color:#fff;}
.topbar-right{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
.pill{font-size:10px;font-weight:700;color:#2D1B00;padding:3px 8px;border-radius:99px;}
.pill-gold{background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);}
.pill-pt{background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);}
.pill-lv{background:rgba(255,255,255,0.25);color:#fff;border:1px solid rgba(255,255,255,0.4);}
.nav{display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-bottom:2px solid var(--border);}
.nav-btn{padding:7px 2px;font-size:8px;font-weight:700;color:#B07030;background:transparent;border:none;cursor:pointer;text-align:center;border-bottom:2px solid transparent;transition:all 0.15s;line-height:1.4;}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.content{flex:1;padding:12px;overflow-y:auto;}
.card{background:#fff;border-radius:14px;border:1.5px solid #FFD5A0;padding:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(255,140,0,0.07);}
.card-title{font-size:10px;font-weight:700;color:#2D1B00;color:#E67A00;letter-spacing:0.1em;margin-bottom:8px;text-transform:uppercase;}
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.stat-box{background:#FFF8F0;border-radius:10px;padding:8px 12px;border:1.5px solid #FFD5A0;}
.stat-lbl{font-size:9px;color:#B07030;margin-bottom:2px;font-weight:600;letter-spacing:0.05em;}
.stat-val{font-size:17px;font-weight:700;color:var(--text);}
.stat-sub{font-size:9px;color:#C08840;margin-top:1px;}
.btn{display:block;width:100%;padding:12px;font-size:13px;font-weight:700;border-radius:10px;border:1.5px solid #FFD5A0;background:#fff;color:#2D1B00;cursor:pointer;transition:all 0.15s;margin-bottom:8px;text-align:center;}
.btn:hover{border-color:var(--accent);background:#FFF3E0;}
.btn:active{transform:scale(0.97);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:#E67A00;border-color:#E67A00;color:#fff;}
.btn-green{background:var(--green);color:#fff;border-color:var(--green);}
.btn-blue{background:var(--blue);color:#fff;border-color:var(--blue);}
.btn-gacha{background:linear-gradient(135deg,var(--accent),var(--accent3));color:#fff;border:none;font-size:14px;}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red);}
.btn-choice{background:#FFF8F0;color:#2D1B00;border:1.5px solid #FFD5A0;padding:10px 14px;border-radius:10px;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;width:100%;margin-bottom:6px;text-align:left;display:block;}
.btn-choice:hover{border-color:#FF8C00;background:#FFF3E0;}
.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px;}
.action-card{background:#FFF8F0;border-radius:12px;border:1.5px solid #FFD5A0;padding:10px;cursor:pointer;transition:all 0.15s;}
.action-card:hover{border-color:var(--accent);background:#FFF3E0;}
.action-icon{font-size:22px;margin-bottom:4px;}
.action-name{font-size:12px;font-weight:700;color:var(--text);}
.action-desc{font-size:9px;color:var(--text3);margin-top:2px;line-height:1.3;}
.risk-tag{font-size:8px;font-weight:700;padding:2px 6px;border-radius:99px;display:inline-block;margin-top:4px;}
.risk-none{background:#DCFCE7;color:#14532D;}
.risk-low{background:#FEF9C3;color:#713F12;}
.risk-mid{background:#FED7AA;color:#7C2D12;}
.risk-high{background:#FECACA;color:#7F1D1D;}
.risk-max{background:#EDE9FE;color:#4C1D95;}
.jk-btn{width:88px;height:88px;font-size:40px;border-radius:16px;border:2px solid #FFD5A0;background:#FFF8F0;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;}
.jk-btn:hover{transform:scale(1.12);border-color:#FF8C00;background:#FFF3E0;}
.jk-btn:active{transform:scale(0.95);}
.result-badge{display:inline-block;font-size:20px;font-weight:700;padding:8px 24px;border-radius:12px;margin-bottom:6px;}
.win-badge{background:#DCFCE7;color:#14532D;border:2px solid #22C55E;}
.lose-badge{background:#FEE2E2;color:#7F1D1D;border:2px solid #EF4444;}
.draw-badge{background:#FEF9C3;color:#713F12;border:2px solid #EAB308;}
.rarity-n{color:#6B7280;}.rarity-r{color:#2563EB;}.rarity-sr{color:#7C3AED;}.rarity-ssr{color:#D97706;}.rarity-ur{color:#DC2626;}
.badge-n{background:#F3F4F6;color:#6B7280;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;}
.badge-r{background:#EFF6FF;color:#2563EB;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;}
.badge-sr{background:#F5F3FF;color:#7C3AED;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;}
.badge-ssr{background:#FFFBEB;color:#D97706;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;}
.badge-ur{background:#FFF1F2;color:#DC2626;font-size:8px;font-weight:700;padding:1px 5px;border-radius:99px;}
.staff-card{background:#FFF8F0;border-radius:12px;border:1.5px solid #FFD5A0;padding:10px;margin-bottom:8px;}
.staff-header{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.staff-avatar{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;background:#FFE8C0;flex-shrink:0;border:1px solid #FFD5A0;}
.staff-name{font-size:13px;font-weight:700;color:var(--text);}
.staff-role{font-size:9px;color:var(--text3);margin-top:1px;}
.staff-xp-track{height:4px;background:#FFE8C0;border-radius:2px;overflow:hidden;margin:4px 0;}
.staff-xp-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.4s;}
.stat-pills{display:flex;gap:4px;flex-wrap:wrap;}
.stat-pill{font-size:9px;background:#FFF3E0;border:1px solid #FFD5A0;padding:2px 6px;border-radius:99px;color:#B07030;font-weight:600;}
.skill-pill{font-size:9px;padding:2px 7px;border-radius:99px;font-weight:700;}
.office-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px;}
.office-cell{aspect-ratio:1;background:#FFF8F0;border-radius:10px;border:1.5px solid #FFD5A0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.15s;}
.office-cell:hover{border-color:var(--accent);}
.office-cell.empty{border-style:dashed;opacity:0.5;}
.office-cell .cell-lbl{font-size:6px;color:var(--text3);margin-top:2px;text-align:center;line-height:1.2;}
.shop-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#FFF8F0;border-radius:10px;border:1.5px solid #FFD5A0;margin-bottom:6px;}
.log-scroll{max-height:80px;overflow-y:auto;background:#FFF3E0;border-radius:8px;padding:6px 10px;border:1.5px solid #FFD5A0;}
.log-item{font-size:9px;color:#B07030;padding:2px 0;border-bottom:1px solid #FFE8C0;line-height:1.4;}
.gacha-card-anim{animation:gpop 0.5s cubic-bezier(0.34,1.56,0.64,1);}
@keyframes gpop{0%{transform:scale(0.5) rotate(-5deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
.event-banner{background:#FFF3CD;border-radius:10px;padding:10px 12px;margin-bottom:10px;border-left:4px solid var(--accent);}
.philosophy-card{border-radius:12px;padding:10px;margin-bottom:6px;cursor:pointer;border:2px solid #FFD5A0;background:#FFF8F0;transition:all 0.2s;}
.philosophy-card:hover{border-color:var(--accent);}
.philosophy-card.selected-ph{border-color:#FF8C00;background:#FFF3E0;}
.dashboard-bar{height:5px;border-radius:3px;overflow:hidden;background:#FFE8C0;margin:3px 0;}
.dashboard-fill{height:100%;border-radius:3px;transition:width 0.6s;}
.timeline-item{display:flex;gap:10px;padding:6px 0;border-left:2px solid #FFD5A0;margin-left:8px;padding-left:12px;position:relative;}
.timeline-item::before{content:'';position:absolute;left:-5px;top:12px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);}
.timeline-year{font-size:9px;color:var(--accent);font-weight:700;min-width:36px;}
.timeline-text{font-size:10px;color:var(--text2);}
.event-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.event-box{background:#fff;border-radius:16px;padding:20px;width:100%;max-width:340px;border:2px solid #FFD5A0;box-shadow:0 8px 32px rgba(255,140,0,0.15);}
.sat-bar{height:4px;border-radius:2px;overflow:hidden;background:#FFE8C0;margin:3px 0;}
.sat-fill{height:100%;border-radius:2px;transition:width 0.4s;}
.brand-meter{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
input{background:#FFF8F0;color:#2D1B00;border:1.5px solid #FFD5A0;border-radius:8px;padding:10px 14px;font-size:14px;font-family:inherit;outline:none;width:100%;margin-bottom:12px;}
input::placeholder{color:#C08840;}
.ending-rank{font-size:64px;margin-bottom:8px;filter:drop-shadow(0 0 24px rgba(255,215,0,0.6));}
.ending-title{font-size:22px;font-weight:700;color:#2D1B00;margin-bottom:4px;}
.ending-sub{font-size:11px;color:var(--text3);margin-bottom:20px;line-height:1.6;text-align:center;}
.score-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #FFE8C0;font-size:11px;}
.score-key{color:#B07030;}
.score-val{font-weight:700;color:#2D1B00;}
.turn-warn{background:#FEF3C7;border:1.5px solid #F59E0B;border-radius:8px;padding:6px 10px;font-size:10px;color:#92400E;font-weight:700;margin-bottom:8px;text-align:center;}
input:focus{border-color:#FF8C00;}
</style>

<div id="app">

<!-- SETUP -->
<div id="setup-screen" class="screen active">
  <div style="background:linear-gradient(180deg,#FF8C00,#FFB347);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;">
    <div style="font-size:60px;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(255,140,0,0.5));">🏢</div>
    <div style="font-size:24px;font-weight:700;color:var(--text);margin-bottom:2px;">じゃんけん社長</div>
    <div style="font-size:11px;color:var(--gold);margin-bottom:4px;letter-spacing:0.2em;">VER 3.0</div>
    <div style="font-size:10px;color:var(--text3);margin-bottom:24px;text-align:center;">起業・経営シミュレーション ＋ 箱庭 ＋ コレクション</div>
    <div style="width:100%;max-width:320px;background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border);">
      <div style="font-size:9px;font-weight:700;color:var(--text3);margin-bottom:6px;letter-spacing:0.1em;">COMPANY NAME</div>
      <input id="s-cname" type="text" maxlength="20" placeholder="例: 株式会社スタートアップ"/>
      <div style="font-size:9px;font-weight:700;color:var(--text3);margin-bottom:6px;letter-spacing:0.1em;">CEO NAME</div>
      <input id="s-pname" type="text" maxlength="10" placeholder="例: 田中"/>
      <div style="font-size:9px;font-weight:700;color:var(--text3);margin-bottom:8px;letter-spacing:0.1em;">PHILOSOPHY — 経営理念を選べ</div>
      <div id="ph-selector"></div>
      <button class="btn btn-primary" onclick="setupGame()" style="margin-top:8px;">🚀 創業する！</button>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title" id="tb-co">会社名</div>
    <div class="topbar-right">
      <span class="pill pill-gold" id="tb-gold">💰100万</span>
      <span class="pill pill-pt" id="tb-pt">🎯0pt</span>
      <span class="pill pill-lv" id="tb-lv">Lv1</span>
    </div>
  </div>
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('home')" id="tab-home">🏢<br>経営</button>
    <button class="nav-btn" onclick="switchTab('staff')" id="tab-staff">👥<br>社員</button>
    <button class="nav-btn" onclick="switchTab('office')" id="tab-office">🏠<br>オフィス</button>
    <button class="nav-btn" onclick="switchTab('gacha')" id="tab-gacha">🎰<br>採用</button>
    <button class="nav-btn" onclick="switchTab('more')" id="tab-more">📖<br>記録</button>
  </div>
  <div class="content">
    <div id="view-home"></div>
    <div id="view-staff" style="display:none;"></div>
    <div id="view-office" style="display:none;"></div>
    <div id="view-gacha" style="display:none;"></div>
    <div id="view-more" style="display:none;"></div>
  </div>
</div>

<!-- JK SCREEN -->
<div id="jk-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title" id="jk-label">契約締結じゃんけん！</div>
    <div class="topbar-right"><span class="pill pill-gold" id="jk-gold">💰</span></div>
  </div>
  <div class="content" style="display:flex;flex-direction:column;align-items:center;text-align:center;">
    <div style="font-size:10px;color:var(--text3);margin-bottom:8px;letter-spacing:0.05em;">— 最後の勝負所。じゃんけんで契約を決める —</div>
    <div style="font-size:11px;color:#7C4A00;margin-bottom:16px;padding:10px 14px;background:var(--bg2);border-radius:10px;border:1px solid var(--border);width:100%;line-height:1.7;white-space:pre-wrap;text-align:left;" id="jk-desc"></div>
    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:16px;" id="jk-hands">
      <button class="jk-btn" onclick="playJK('グー')">✊</button>
      <button class="jk-btn" onclick="playJK('チョキ')">✌️</button>
      <button class="jk-btn" onclick="playJK('パー')">🖐️</button>
    </div>
    <div id="jk-result" style="display:none;width:100%;">
      <div style="font-size:32px;margin-bottom:8px;" id="jk-vs"></div>
      <div id="jk-outcome-badge"></div>
      <div style="font-size:13px;color:#7C4A00;margin:8px 0 16px;font-weight:600;" id="jk-sub"></div>
      <button class="btn btn-primary" style="font-size:14px;padding:14px;" onclick="afterJK()">次のターンへ ▶</button>
    </div>
    <div class="log-scroll" style="width:100%;margin-top:10px;" id="jk-log"></div>
  </div>
</div>

<!-- GACHA RESULT -->
<div id="gacha-screen" class="screen">
  <div class="topbar">
    <div class="topbar-title">採用ガチャ結果</div>
    <div class="topbar-right"><span class="pill pill-gold" id="gr-gold">💰</span></div>
  </div>
  <div class="content" id="gacha-result-content" style="text-align:center;"></div>
  <div style="padding:0 12px 16px;"><button class="btn btn-primary" onclick="closeGachaScreen()">← 戻る</button></div>
</div>

<!-- ENDING SCREEN -->
<div id="ending-screen" class="screen">
  <div style="background:linear-gradient(180deg,#FFF8F0,#FFE8C0);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;">
    <div id="ending-content"></div>
  </div>
</div>

<!-- EVENT OVERLAY -->
<div id="event-overlay" class="event-overlay" style="display:none;">
  <div class="event-box" id="event-box-content"></div>
</div>

<!-- OFFICE MODAL -->
<div id="office-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;align-items:flex-end;justify-content:center;">
  <div style="background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:390px;max-height:70vh;overflow-y:auto;border-top:2px solid #FFD5A0;">
    <div id="office-modal-content"></div>
  </div>
</div>

</div>

<script>
// =========== CONSTANTS ===========
const HANDS=['グー','チョキ','パー'];
const HEMOJI={グー:'✊',チョキ:'✌️',パー:'🖐️'};

const LEVELS=[
  {lv:1,name:'個人事業',min:0},{lv:2,name:'小企業',min:300},{lv:3,name:'ベンチャー',min:800},
  {lv:4,name:'中堅企業',min:2000},{lv:5,name:'上場企業',min:5000},{lv:6,name:'大企業',min:15000},
  {lv:7,name:'世界企業',min:50000},{lv:8,name:'宇宙企業',min:200000},{lv:9,name:'銀河',min:1000000},{lv:10,name:'神企業',min:5000000},
];

// 経営理念
const PHILOSOPHIES=[
  {id:'aggressive',name:'攻撃的成長',icon:'⚔️',color:'#EF4444',
   desc:'大型案件出現率+30% / 失敗リスク+20% / 成長速度+30%',
   mods:{bigDealBonus:0.3,lossMultiplier:1.2,growthRate:1.3,laborMod:1.0}},
  {id:'local',name:'地域密着',icon:'🏘️',color:'#22C55E',
   desc:'安定収益+15% / 失敗リスク-20% / 社員満足度+5 / 成長-10%',
   mods:{bigDealBonus:-0.1,lossMultiplier:0.8,growthRate:0.9,laborMod:0.9,satBonus:5}},
  {id:'stable',name:'安定経営',icon:'🛡️',color:'#3B82F6',
   desc:'失敗リスク-30% / 成長速度-20% / 毎月安定ボーナス+20万',
   mods:{bigDealBonus:-0.1,lossMultiplier:0.7,growthRate:0.8,laborMod:1.0,monthlyBonus:20}},
  {id:'innovation',name:'イノベーション',icon:'🚀',color:'#7C3AED',
   desc:'技術案件リターン+40% / 開発成功率+20% / 技術力向上加速',
   mods:{bigDealBonus:0.1,lossMultiplier:1.0,growthRate:1.1,devBonus:0.4,devSuccessBonus:0.2}},
  {id:'people',name:'人材第一',icon:'❤️',color:'#F472B6',
   desc:'社員満足度+10 / 採用Pt獲得+30% / 給与コスト+10%',
   mods:{bigDealBonus:0.0,lossMultiplier:1.0,growthRate:1.0,laborMod:1.1,satBonus:10,ptMod:1.3}},
];

// 社員スキル (新システム⑤)
const STAFF_SKILLS={
  salesperson:{id:'salesperson',name:'営業マン',icon:'📣',color:'#EF4444',bg:'rgba(239,68,68,0.15)',desc:'営業失敗時の損失50%減'},
  pr:{id:'pr',name:'広報担当',icon:'📢',color:'#F59E0B',bg:'rgba(245,158,11,0.15)',desc:'広告イベント発生率2倍'},
  accountant:{id:'accountant',name:'経理',icon:'💹',color:'#22C55E',bg:'rgba(34,197,94,0.15)',desc:'毎月資金ボーナス+15万'},

function load(){
  try{const s=localStorage.getItem('jks_v4');if(s){G=JSON.parse(s);G.collected=new Set(G._col||[]);G.brand=G.brand||{famous:10,trust:30,tech:10,satisfaction:50};G.history=G.history||[];}}catch(e){}
}
function save(){
  try{const s={...G,_col:[...G.collected]};delete s.collected;localStorage.setItem('jks_v4',JSON.stringify(s));}catch(e){}
}

function getLv(){let c=LEVELS[0];for(const l of LEVELS){if(G.value>=l.min)c=l;else break;}return c;}
function getLaborCost(){const ph=getPhilosophy();return Math.round(G.staff.reduce((s,st)=>s+(st.onRest?Math.round(st.wage*0.7):st.wage),0)*(ph.mods.laborMod||1.0));}
function getOfficeBonus(){
  const b={sales:0,tech:0,pr:0,luck:0};
  G.office.forEach(id=>{if(!id)return;const it=OFFICE_ITEMS.find(x=>x.id===id);if(it&&it.bonus)Object.keys(it.bonus).forEach(k=>{b[k]=(b[k]||0)+it.bonus[k];});});
  return b;
}
function getOfficeSatBonus(){let n=0;G.office.forEach(id=>{if(!id)return;const it=OFFICE_ITEMS.find(x=>x.id===id);if(it&&it.satBonus)n+=it.satBonus;});return n;}
function getStaffBonus(key){
  const ob=getOfficeBonus();
  const base=G.staff.filter(s=>!s.onRest).reduce((s,st)=>s+(st[key]||0)*(1+(st.xp||0)/200),0);
  return Math.round(base*(1+(ob[key]||0)/100));
}
function getPhilosophy(){return PHILOSOPHIES.find(p=>p.id===G.philosophy)||PHILOSOPHIES[2];}
function fmt(v){const av=Math.abs(v),sg=v<0?'-':'';if(av>=1000000)return sg+(av/1000000).toFixed(2)+'兆';if(av>=10000)return sg+(av/10000).toFixed(1)+'億';return sg+Math.round(av)+'万';}
function addLog(msg){logs.unshift('[T'+G.turn+'] '+msg);if(logs.length>30)logs.pop();}
function addHistory(text){const month=((G.turn-1)%12)+1;G.history.push({year:G.year,month,text});if(G.history.length>20)G.history.shift();}
function hasSkill(id){return G.staff.filter(s=>!s.onRest).some(s=>s.skill===id);}
function countSkill(id){return G.staff.filter(s=>!s.onRest&&s.skill===id).length;}

function updateBrand(){
  const avgSat=G.staff.length>0?G.staff.reduce((a,s)=>a+(s.satisfaction||50),0)/G.staff.length:50;
  G.brand.satisfaction=Math.min(100,Math.round(avgSat));
  G.brand.tech=Math.min(100,Math.round((G.brand.tech||10)+(G.techLevel||0)*0.02));
  if(hasSkill('pr'))G.brand.famous=Math.min(100,(G.brand.famous||10)+1);
  if(hasSkill('founder'))G.brand.trust=Math.min(100,(G.brand.trust||30)+1);
}

function tickSatisfaction(){
  const satOffice=getOfficeSatBonus();
  const ph=getPhilosophy();
  const phBonus=ph.mods.satBonus||0;
  const toRemove=[];
  G.staff.forEach(s=>{
    let d=s.onRest?5:-2;
    d+=Math.round(satOffice*0.05);
    d+=Math.round(phBonus*0.1);
    s.satisfaction=Math.max(0,Math.min(100,(s.satisfaction||50)+Math.round(d)));
    if(s.satisfaction<20&&Math.random()<0.15)toRemove.push(s);
  });
  toRemove.forEach(s=>{
    G.staff=G.staff.filter(x=>x!==s);
    addLog('😢 '+s.name+'が低満足度で自主退職！');
    addHistory(s.name+'が低待遇に耐えかねて退職');
  });
}

// ======== ACTION → JK ========
function selectAction(a){
  const ph=getPhilosophy();
  if(a.id==='save'){
    const bonus=getStaffBonus('sales');
    const amt=Math.round(20*(1+bonus/200));
    G.money+=amt;G.value+=Math.round(amt*0.1);
    if(ph.mods.monthlyBonus&&G.turn%10===0)G.money+=ph.mods.monthlyBonus;
    addLog('[経費削減] +'+amt+'万円 節約');
    advanceTurn();return;
  }
  const statKey=a.id==='ad'?'pr':a.id==='dev'?'tech':'sales';
  const bonus=getStaffBonus(statKey);
  const phGrowth=a.id==='dev'?((ph.mods.devBonus||0)+1)*(ph.mods.growthRate||1):(ph.mods.growthRate||1);
  const designMod=hasSkill('designer')?1.2:1;
  const winAmt=Math.round(a.winBase*(1+bonus/100)*phGrowth*designMod);
  const loseAmt=Math.round(a.loseBase*(ph.mods.lossMultiplier||1));
  const devBoost=a.id==='dev'&&hasSkill('engineer')?((ph.mods.devSuccessBonus||0)+0.3):0;

  pendingJK={
    devBoost,
    desc:`案件詳細\n社員ボーナス+${Math.round(bonus)}% / 理念補正×${phGrowth.toFixed(1)}${designMod>1?' / デザイナー補正×1.2':''}\n勝利: +${winAmt}〜${Math.round(winAmt*1.5)}万${a.ptReward?' / Pt +'+a.ptReward:''}${devBoost>0?' / [エンジニアスキル発動]':''}\n敗北: ${loseAmt}万`,
    ptReward:a.ptReward||0,
    onWin(){
      const tot=winAmt+Math.round(winAmt*Math.random()*0.5);
      if(a.id==='ad'){G.value+=tot;G.brand.famous=Math.min(100,(G.brand.famous||10)+5);G.brand.trust=Math.min(100,(G.brand.trust||30)+2);}
      else{G.money+=tot;G.value+=Math.round(tot*0.3);}
      if(a.id==='dev'){G.techLevel=(G.techLevel||0)+5;G.brand.tech=Math.min(100,(G.brand.tech||10)+3);}
      const ptMod=ph.mods.ptMod||1;
      G.gachaPt+=Math.round((a.ptReward||0)*ptMod);
      G.staff.forEach(s=>{s.xp=(s.xp||0)+2;s.satisfaction=Math.min(100,(s.satisfaction||50)+3);});
      addLog('['+a.name+'] 勝利 +'+tot+'万');
      addHistory(a.name+'案件受注 +'+tot+'万');
      return '+'+tot+'万円獲得！';
    },
    onDraw(){
      if(a.id==='ad')G.value+=a.drawBase;else G.money+=a.drawBase;
      G.staff.forEach(s=>{s.xp=(s.xp||0)+1;});
      addLog('['+a.name+'] 引き分け +'+a.drawBase+'万');
      return '引き分け +'+a.drawBase+'万';
    },
    onLose(){
      const halved=a.id==='sales'&&hasSkill('salesperson');
      const actual=halved?Math.round(loseAmt*0.5):loseAmt;
      G.money+=actual;G.value+=Math.round(actual*0.2);
      G.staff.forEach(s=>{s.satisfaction=Math.max(0,(s.satisfaction||50)-5);});
      addLog('['+a.name+'] 敗北 '+actual+'万'+(halved?' [スキル半減]':''));
      return actual+'万の損失'+(halved?' (営業スキルで半減！)':'')+'...';
    }
  };
  document.getElementById('jk-label').textContent='【'+a.name+'】契約締結じゃんけん！';
  document.getElementById('jk-desc').textContent=pendingJK.desc;
  document.getElementById('jk-hands').style.display='flex';
  document.getElementById('jk-result').style.display='none';
  document.getElementById('jk-log').innerHTML=logs.slice(0,4).map(function(l){return '<div class="log-item">'+l+'</div>';}).join('');
  showScreen('jk-screen');
}

function playJK(myHand){
  const en=HANDS[Math.floor(Math.random()*3)];
  document.getElementById('jk-hands').style.display='none';
  document.getElementById('jk-vs').textContent=HEMOJI[myHand]+' VS '+HEMOJI[en];
  let out=judgeJK(myHand,en);
  if(out==='lose'&&pendingJK.devBoost>0&&Math.random()<pendingJK.devBoost)out='draw';
  let sub='',badge='';
  if(out==='win'){G.wins++;sub=pendingJK.onWin();badge=`<span class="result-badge win-badge">🎉 契約成立！</span>`;}
  else if(out==='draw'){G.draws++;sub=pendingJK.onDraw();badge=`<span class="result-badge draw-badge">🤝 引き分け</span>`;}
  else{G.losses++;sub=pendingJK.onLose();badge=`<span class="result-badge lose-badge">💔 敗北...</span>`;}
  document.getElementById('jk-outcome-badge').innerHTML=badge;
  document.getElementById('jk-sub').textContent=sub;
  document.getElementById('jk-result').style.display='block';
  if(G.money<-200&&G.value<=0){addLog('💸 倒産！緊急再建');G.money=100;G.value=100;G.staff=[];}
  save();updateTop();
}

function afterJK(){showScreen('main-screen');advanceTurn();}
function judgeJK(my,en){if(my===en)return'draw';if((my==='グー'&&en==='チョキ')||(my==='チョキ'&&en==='パー')||(my==='パー'&&en==='グー'))return'win';return'lose';}

// ======== TURN ========
function advanceTurn(){
  G.turn++;G.day+=3;
  if(G.day>=G.nextPayday)doPayday();
  tickSatisfaction();
  updateBrand();
  const ph=getPhilosophy();
  // 安定経営 毎月ボーナス
  if(ph.mods.monthlyBonus&&G.turn%10===0){G.money+=ph.mods.monthlyBonus;addLog('🛡️ 安定ボーナス +'+ph.mods.monthlyBonus+'万');}
  // 経理スキル
  const acc=countSkill('accountant');
  if(acc>0&&G.turn%10===0){const b=acc*15;G.money+=b;addLog('💹 経理スキルボーナス +'+b+'万');}
  // 年進行
  if(G.turn%16===0){G.year++;addHistory('Year '+G.year+'到達 — 企業価値 '+fmt(G.value));}
  // ===== GOAL CHECK =====
  if(G.turn>=MAX_TURNS){
    save();
    showEnding();
    return;
  }
  // ランダムイベント 20%
  if(Math.random()<0.20){fireRandomEvent();return;}
  save();switchTab('home');
}

function doPayday(){
  G.nextPayday+=30;
  const labor=getLaborCost();
  if(labor===0){addLog('給料日（無給）');return;}
  if(G.money>=labor){
    G.money-=labor;G.totalLabor+=labor;
    G.staff.forEach(s=>{s.satisfaction=Math.min(100,(s.satisfaction||50)+5);});
    addLog('✅ 給料日 -'+labor+'万 完了');
  }else{
    addLog('⚠️ 給料不足！社員1名解雇');
    if(G.staff.length>0){const f=G.staff.pop();addLog('😢 リストラ: '+f.name);}
    G.money=Math.max(0,G.money-labor);
  }
}

function calcScore(){
  var base=G.value;
  var winBonus=G.wins*50;
  var staffBonus=G.staff.length*200;
  var brandBonus=(G.brand.famous+G.brand.trust+G.brand.tech+G.brand.satisfaction)*10;
  var collBonus=G.collected.size*100;
  var equityBonus=Math.round(base*(G.equity||100)/100*0.1);
  return Math.round(base+winBonus+staffBonus+brandBonus+collBonus+equityBonus);
}

function getEnding(){
  var v=G.value;
  for(var i=0;i<ENDINGS.length;i++){if(v>=ENDINGS[i].min)return ENDINGS[i];}
  return ENDINGS[ENDINGS.length-1];
}

function fireRandomEvent(){
  const ev=RAND_EVENTS[Math.floor(Math.random()*RAND_EVENTS.length)];
  if(ev.type==='auto'){
    const result=ev.effect(G);
    showEventOverlay(ev.name,ev.desc,result,null);
  }else{
    showEventOverlay(ev.name,ev.desc,null,ev.choices);
  }
}

function showEventOverlay(title,desc,autoResult,choices){
  let h=`<div style="text-align:center;margin-bottom:12px;">
    <div style="font-size:18px;font-weight:700;color:var(--text);margin-bottom:6px;">${title}</div>
    <div style="font-size:11px;color:var(--text2);line-height:1.6;">${desc}</div>

    h+=`<div style="background:rgba(255,140,0,0.1);border-radius:8px;padding:10px 12px;border:1px solid var(--accent);margin-bottom:12px;font-size:11px;color:var(--text);font-weight:600;text-align:center;">${autoResult}</div>`;
    h+=`<button class="btn btn-primary" onclick="closeEvent()">OK → 次のターンへ</button>`;

  }else if(choices){
    _eventChoices=choices;
    choices.forEach((c,i)=>{h+=`<button class="btn-choice" onclick="resolveEvent(${i})">${c.label}</button>`;});
  }
  document.getElementById('event-box-content').innerHTML=h;
  document.getElementById('event-overlay').style.display='flex';
}

function resolveEvent(idx){
  const result=_eventChoices[idx].effect(G);
  let h=`<div style="text-align:center;padding:8px;">
    <div style="font-size:32px;margin-bottom:8px;">✅</div>
    <div style="font-size:13px;color:var(--text);font-weight:700;margin-bottom:16px;">${result}</div>
    <button class="btn btn-primary" onclick="closeEvent()">次のターンへ ▶</button>
  </div>`;
  document.getElementById('event-box-content').innerHTML=h;
}

function closeEvent(){

function toggleRest(i){
  G.staff[i].onRest=!G.staff[i].onRest;const s=G.staff[i];
  if(s.onRest){s.satisfaction=Math.min(100,(s.satisfaction||50)+15);addLog('😴 '+s.name+'が休暇（満足度+15）');}
  else{addLog('💪 '+s.name+'が復帰！');}
  save();renderStaff();updateTop();
}
function trainStaff(i){
  if(G.money<30){alert('資金不足！30万必要');return;}
  G.money-=30;const s=G.staff[i];
  const oldLv=Math.floor((s.xp||0)/50)+1;
  s.xp=(s.xp||0)+25;s.satisfaction=Math.min(100,(s.satisfaction||50)+10);
  const keys=['sales','tech','pr','luck'];const k=keys[Math.floor(Math.random()*keys.length)];s[k]+=2;
  const newLv=Math.floor(s.xp/50)+1;
  // レベルアップ時に自動昇給
  if(newLv>oldLv){
    const raise=Math.round(s.wage*0.15)+2;
    s.wage+=raise;
    addLog('📚 '+s.name+' Lv'+newLv+'昇格！給与+'+raise+'万 自動昇給');
    addHistory(s.name+'がLv'+newLv+'に昇格、給与'+s.wage+'万に昇給');
  }else{
    addLog('📚 '+s.name+' 特訓！'+k+'+2 XP+25');
  }
  save();renderStaff();updateTop();
}

function raiseWage(i){
  const s=G.staff[i];
  const raise=Math.max(3,Math.round(s.wage*0.2));
  const cost=raise*3; // 昇給コスト（3ヶ月分の差額を一括）
  if(G.money<cost){alert('資金不足！昇給コスト: '+cost+'万必要\n（昇給額'+raise+'万 × 3ヶ月分）');return;}
  G.money-=cost;
  s.wage+=raise;
  s.satisfaction=Math.min(100,(s.satisfaction||50)+20);
  addLog('💰 '+s.name+' 昇給 +'+raise+'万 → 月給'+s.wage+'万');
  addHistory(s.name+'が昇給、月給'+s.wage+'万円に');
  save();renderStaff();updateTop();
}
function fireStaff(i){
  if(confirm(G.staff[i].name+'を解雇しますか？')){
    const f=G.staff.splice(i,1)[0];addLog('🔥 '+f.name+'を解雇した');save();renderStaff();updateTop();
  }
}

function buyFurniture(id,price){
  if(G.money<price){alert('お金が足りません！');return;}
  const empty=G.office.indexOf(null);
  if(empty===-1){alert('オフィスが満杯です！撤去してから配置してください。');return;}
  G.money-=price;G.office[empty]=id;
  const it=OFFICE_ITEMS.find(x=>x.id===id);addLog('🏠 '+it.name+'を購入・設置');
  save();renderOffice();updateTop();
}

function selectCell(idx){
  const current=G.office[idx];const modal=document.getElementById('office-modal');
  let h=`<div style="font-weight:700;font-size:13px;margin-bottom:10px;color:var(--text);">マス${idx+1} — ${current?OFFICE_ITEMS.find(x=>x.id===current)?.name+'を変更':'空きスペース'}</div>`;
  if(current){
    h+=`<button class="btn btn-danger" style="margin-bottom:8px;" onclick="removeCell(${idx})">🗑️ ${OFFICE_ITEMS.find(x=>x.id===current)?.name}を撤去</button>`;
    h+=`<div style="font-size:9px;color:var(--text3);margin-bottom:8px;">別のものと交換する：</div>`;
  }
  OFFICE_ITEMS.forEach(it=>{
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px;background:#FFF8F0;border-radius:7px;border:1.5px solid #FFD5A0;margin-bottom:5px;">

      <button style="padding:4px 9px;font-size:10px;font-weight:700;color:#2D1B00;border-radius:6px;border:1px solid ${current?'var(--blue)':'var(--accent)'};background:${current?'var(--blue)':'var(--accent)'};color:#fff;cursor:pointer;" onclick="placeItem(${idx},'${it.id}',${it.price})">${current?'交換':'💰'+it.price+'万'}</button>
    </div>`;

  document.getElementById('office-modal-content').innerHTML=h;modal.style.display='flex';
}

function placeItem(idx,id,price){
  const current=G.office[idx];
  if(!current&&G.money<price){alert('お金が足りません！');return;}
  if(!current)G.money-=price;G.office[idx]=id;
  const it=OFFICE_ITEMS.find(x=>x.id===id);addLog('🏠 '+it.name+'を'+(current?'交換':'設置'));
  save();closeOfficeModal();renderOffice();updateTop();
}

function removeCell(idx){
  const it=OFFICE_ITEMS.find(x=>x.id===G.office[idx]);G.office[idx]=null;
  addLog('🗑️ '+(it?.name)+'を撤去');save();closeOfficeModal();renderOffice();
}

function rollRarity(){let r=Math.random()*100;for(let i=0;i<RARITIES.length;i++){if((r-=RARITY_WEIGHT[i])<=0)return RARITIES[i];}return'N';}

function doGacha(times){
  if(G.gachaPt<GACHA_COST_PT*times){alert('採用ポイントが足りません！\n必要: '+GACHA_COST_PT*times+'pt / 現在: '+G.gachaPt+'pt');return;}
  G.gachaPt-=GACHA_COST_PT*times;G.gachaCount=(G.gachaCount||0)+times;
  const results=[];
  for(let i=0;i<times;i++){
    const r=rollRarity();const pool=STAFF_DB.filter(s=>s.rarity===r);
    const s={...pool[Math.floor(Math.random()*pool.length)],xp:0,satisfaction:60,onRest:false};
    const isNew=!G.collected.has(s.id);G.collected.add(s.id);G.staff.push(s);G.hired++;
    addLog('🎰 採用: '+s.name+' ['+s.rarity+']'+(isNew?' NEW!':''));
    results.push({...s,isNew});
  }
  if(results.length===1)addHistory(results[0].name+'['+results[0].rarity+']を採用');
  save();updateTop();
  let h='';
  if(results.length===1){
    const s=results[0];const bc='badge-'+s.rarity.toLowerCase();const sk=STAFF_SKILLS[s.skill];
    h=`<div style="text-align:center;padding:20px 0;">
      ${s.isNew?`<div style="background:rgba(251,211,105,0.15);color:var(--gold);font-size:10px;font-weight:700;color:#2D1B00;padding:3px 14px;border-radius:99px;display:inline-block;margin-bottom:10px;border:1px solid var(--gold);">NEW RECRUIT!</div>`:''}
      <div class="gacha-card-anim" style="background:#FFF8F0;border-radius:18px;border:2px solid var(--accent);padding:20px;margin-bottom:16px;display:inline-block;min-width:200px;">
        <div style="font-size:50px;margin-bottom:8px;">${s.emoji}</div>
        <div style="font-size:17px;font-weight:700;margin-bottom:4px;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
        <div style="font-size:10px;color:var(--text3);margin:6px 0;">${s.role}</div>
        <div style="font-size:9px;color:var(--text3);font-style:italic;margin-bottom:8px;">${s.desc}</div>
        ${sk?`<div style="display:inline-block;padding:4px 10px;border-radius:99px;background:${sk.bg};margin-bottom:8px;"><span style="color:${sk.color};font-size:9px;font-weight:700;">${sk.icon} ${sk.name}</span><div style="font-size:7px;color:${sk.color};opacity:0.8;">${sk.desc}</div></div>`:''}
        <div class="stat-pills" style="justify-content:center;"><span class="stat-pill">営業${s.sales}</span><span class="stat-pill">技術${s.tech}</span><span class="stat-pill">広報${s.pr}</span><span class="stat-pill">運${s.luck}</span></div>
      </div>
    </div>`;
  }else{
    h=`<div style="padding-bottom:8px;"><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px;">`;
    results.forEach(s=>{const bc='badge-'+s.rarity.toLowerCase();const sk=STAFF_SKILLS[s.skill];
      h+=`<div class="gacha-card-anim" style="background:var(--card2);border-radius:12px;border:1.5px solid ${s.rarity==='UR'?'#DC2626':s.rarity==='SSR'?'#D97706':s.rarity==='SR'?'#7C3AED':'#FFD5A0'};padding:10px;text-align:center;">
        ${s.isNew?`<div style="font-size:8px;color:var(--gold);font-weight:700;">NEW!</div>`:''}
        <div style="font-size:26px;">${s.emoji}</div>
        <div style="font-size:10px;font-weight:700;color:#2D1B00;">${s.name}</div>
        <span class="${bc}">${s.rarity}</span>
        ${sk?`<div style="font-size:8px;color:${sk.color};margin-top:3px;">${sk.icon}${sk.name}</div>`:''}
      </div>`;
    });
    h+=`</div></div>`;
  }
  document.getElementById('gacha-result-content').innerHTML=h;
  showScreen('gacha-screen');
}

    <div style="font-size:24px;font-weight:700;color:var(--accent);text-align:center;margin:4px 0;">${Math.round(G.collected.size/STAFF_DB.length*100)}%</div>
    <div style="background:#FFE8C0;border-radius:3px;height:5px;overflow:hidden;"><div style="height:100%;width:${Math.round(G.collected.size/STAFF_DB.length*100)}%;background:var(--accent);"></div></div>
    <div style="font-size:9px;color:var(--text3);text-align:center;margin-top:4px;">${G.collected.size}/${STAFF_DB.length}種 収集済み</div>
  </div>`;

  h+=`<button class="btn btn-danger" onclick="if(confirm('全データをリセットしますか？')){localStorage.removeItem('jks_v4');location.reload();}">⚠️ データをリセット</button>`;
  document.getElementById('view-more').innerHTML=h;
}

// ======== SETUP ========
function renderPhilosophySelector(){
  const el=document.getElementById('ph-selector');if(!el)return;
  let h='';
  PHILOSOPHIES.forEach(ph=>{
    h+=`<div class="philosophy-card${selectedPhilosophy===ph.id?' selected-ph':''}" onclick="selectPhilosophy('${ph.id}')" style="${selectedPhilosophy===ph.id?'border-color:'+ph.color+';':''}" >
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;">
        <span style="font-size:16px;">${ph.icon}</span>
        <div style="font-size:11px;font-weight:700;color:${ph.color};">${ph.name}</div>
      </div>
      <div style="font-size:8px;color:#B07030;line-height:1.4;">${ph.desc}</div>
    </div>`;
  });
  el.innerHTML=h;
}

function selectPhilosophy(id){selectedPhilosophy=id;renderPhilosophySelector();}

function setupGame(){
  const cname=document.getElementById('s-cname').value.trim()||'株式会社スタートアップ';
  const pname=document.getElementById('s-pname').value.trim()||'社長';
  initG(cname,pname,selectedPhilosophy);save();showScreen('main-screen');switchTab('home');
}

// ======== BOOT ========
renderPhilosophySelector();
load();
if(G.company){showScreen('main-screen');switchTab('home');}
else{showScreen('setup-screen');}
</script>
</html>
